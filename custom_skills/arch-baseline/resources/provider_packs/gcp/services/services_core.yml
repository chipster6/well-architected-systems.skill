version: "v1"
services:
  - service_id: compute-engine
    display_name: "Compute Engine"
    category: compute
    short_description: "Virtual machines for running compute workloads with configurable machine types and images."
    key_capabilities:
      - "virtual machines"
    common_use_cases:
      - "host stateless services"
    pricing_model_hint: "per vCPU and memory time"
    references:
      - "gcp:compute-engine"
  - service_id: cloud-storage
    display_name: "Cloud Storage"
    category: storage
    short_description: "Object storage for unstructured data with lifecycle policies and access control."
    key_capabilities:
      - "object storage"
    common_use_cases:
      - "store artifacts and datasets"
    pricing_model_hint: "storage and operations"
    references:
      - "gcp:cloud-storage"
  - service_id: vpc
    display_name: "Virtual Private Cloud"
    category: networking
    short_description: "Networking primitives for isolation, routing, firewalling, and connectivity patterns."
    key_capabilities:
      - "network segmentation"
    common_use_cases:
      - "isolate workloads by environment"
    pricing_model_hint: "varies by attached services"
    references:
      - "gcp:vpc"
  - service_id: cloud-iam
    display_name: "Cloud IAM"
    category: identity
    short_description: "Identity and access management for defining who can do what on which resources."
    key_capabilities:
      - "role-based access control"
    common_use_cases:
      - "least-privilege permissions"
    pricing_model_hint: "no direct charge"
    references:
      - "gcp:cloud-iam"
  - service_id: cloud-kms
    display_name: "Cloud KMS"
    category: security
    short_description: "Managed key service for creating and managing cryptographic keys for encryption use cases."
    key_capabilities:
      - "key management"
    common_use_cases:
      - "encrypt data at rest"
    pricing_model_hint: "per key and operations"
    references:
      - "gcp:cloud-kms"
  - service_id: cloud-operations
    display_name: "Cloud Operations"
    category: observability
    short_description: "Observability suite for metrics, logs, traces, and alerting across workloads."
    key_capabilities:
      - "metrics and logs"
    common_use_cases:
      - "monitor service health"
    pricing_model_hint: "ingestion and retention"
    references:
      - "gcp:cloud-operations"
  - service_id: org-policy
    display_name: "Organization Policy"
    category: governance_management
    short_description: "Policy controls for constraining resource usage and enforcing organizational standards."
    key_capabilities:
      - "policy enforcement"
    common_use_cases:
      - "prevent non-compliant deployments"
    pricing_model_hint: "no direct charge"
    references:
      - "gcp:org-policy"
  - service_id: cloud-build
    display_name: "Cloud Build"
    category: devtools_cicd
    short_description: "CI/CD build service for building, testing, and packaging artifacts."
    key_capabilities:
      - "build pipelines"
    common_use_cases:
      - "build and deploy applications"
    pricing_model_hint: "build minutes"
    references:
      - "gcp:cloud-build"
  - service_id: pub-sub
    display_name: "Pub/Sub"
    category: integration_messaging
    short_description: "Messaging service for asynchronous event delivery using topics and subscriptions."
    key_capabilities:
      - "pub/sub messaging"
    common_use_cases:
      - "event notifications"
    pricing_model_hint: "throughput and retention"
    references:
      - "gcp:pubsub"
  - service_id: bigquery
    display_name: "BigQuery"
    category: data_analytics
    subcategory: data_warehouse
    short_description: "Serverless data warehouse for running SQL analytics at scale on structured data."
    key_capabilities:
      - "data warehouse"
    common_use_cases:
      - "analytics and reporting"
    pricing_model_hint: "storage and query processing"
    references:
      - "gcp:bigquery"
  - service_id: vertex-ai
    display_name: "Vertex AI"
    category: machine_learning
    short_description: "Machine learning platform for training, deploying, and operating ML models."
    key_capabilities:
      - "training and inference"
    common_use_cases:
      - "host ML inference endpoints"
    pricing_model_hint: "compute and usage"
    references:
      - "gcp:vertex-ai"
  - service_id: vertex-ai-genai
    display_name: "Vertex AI (Generative AI)"
    category: genai
    subcategory: foundation_models
    short_description: "Generative AI capabilities within Vertex AI for using foundation models in applications."
    key_capabilities:
      - "foundation model access"
    common_use_cases:
      - "build GenAI features"
    pricing_model_hint: "tokens and requests"
    references:
      - "gcp:vertex-ai"
  - service_id: agent-builder
    display_name: "Vertex AI Agent Builder"
    category: ai_agents
    subcategory: agent_runtime
    short_description: "Service for building agents with tool use, orchestration, and integration capabilities."
    key_capabilities:
      - "agent runtime"
    common_use_cases:
      - "tool-using assistants"
    pricing_model_hint: "usage-based"
    references:
      - "gcp:agent-builder"

